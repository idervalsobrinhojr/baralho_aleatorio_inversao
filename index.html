<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Baralho de Cartas</title>

<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b4332">

<style>
body {
  font-family: 'Trebuchet MS', sans-serif;
  text-align: center;
  padding: 20px;
  margin: 0;

  background: radial-gradient(circle at center, #ecffb0 0%, #b9f624 40%, #6a9e00 100%);
  min-height: 100vh;
  color: #fff;
}

h1 {
  text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
}

/* BOTÕES */
button {
  margin: 8px;
  padding: 14px 22px;
  font-size: 18px;
  font-weight: bold;

  cursor: pointer;
  border: 2px solid #3c096c;
  border-radius: 14px;

  background: linear-gradient(to bottom, #d0bfff, #9d4edd);
  color: white;

  box-shadow:
    0 6px #5a189a,
    0 8px 14px rgba(0,0,0,0.5);

  transition: all 0.15s ease;
}

button:active {
  transform: translateY(4px);
  box-shadow:
    0 2px #5a189a,
    0 4px 6px rgba(0,0,0,0.5);
}

/* TOGGLE */
.toggle-container {
  margin-top: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.led {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: red;
  box-shadow: 0 0 5px rgba(0,0,0,0.6);
}

.led.on {
  background: lime;
  box-shadow: 0 0 10px lime;
}

/* CARTAS */
.area-cartas {
  margin-top: 25px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.carta {
  margin: 12px;
  text-align: center;
  animation: surgir 0.5s ease;
}

@keyframes surgir {
  from {
    transform: translateY(-40px) scale(0.8);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

img {
  width: 400px;
  border-radius: 12px;

  box-shadow:
    0 12px 18px rgba(0,0,0,0.6),
    0 6px 8px rgba(0,0,0,0.4);

  border: 2px solid rgba(255,255,255,0.2);

  transition: transform 0.3s ease;
}

.invertida {
  transform: rotate(180deg);
}

.carta p {
  margin-bottom: 6px;
  font-weight: bold;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<h1>Baralho de Cartas 🎴</h1>

<button onclick="retirarCarta()">Retirar Carta</button>
<button onclick="embaralharDeck()">Embaralhar o Deck</button>
<button onclick="resetarDeck()">Recolher cartas e Embaralhar o Deck</button>

<div class="toggle-container">
  <button onclick="toggleInvertida()">Modo Carta Invertida</button>
  <div id="led" class="led"></div>
</div>

<div class="area-cartas" id="mesa"></div>

<script>

//////////////////////////////////////////////////////////////
// 🔴 BANCO DE DADOS
//////////////////////////////////////////////////////////////
const bancoOriginal = [
  { nome: "Carta 1", arquivo: "imagens/carta01.png" },
  { nome: "Carta 2", arquivo: "imagens/carta02.png" },
  { nome: "Carta 3", arquivo: "imagens/carta03.png" },
  { nome: "Carta 4", arquivo: "imagens/carta04.png" },
  { nome: "Carta 5", arquivo: "imagens/carta05.png" }
];
//////////////////////////////////////////////////////////////

let deck = [];
let cartasRetiradas = [];
let modoInvertido = false;

resetarDeck();

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function retirarCarta() {
  if (deck.length === 0) {
    alert("Todas as cartas já foram retiradas!");
    return;
  }

  const carta = deck.pop();
  cartasRetiradas.push(carta);

  mostrarCarta(carta);
}

function embaralharDeck() {
  embaralhar(deck);
}

function resetarDeck() {
  deck = [...bancoOriginal];
  cartasRetiradas = [];
  embaralhar(deck);
  document.getElementById("mesa").innerHTML = "";
}

function toggleInvertida() {
  modoInvertido = !modoInvertido;

  const led = document.getElementById("led");
  led.classList.toggle("on", modoInvertido);
}

function mostrarCarta(carta) {
  const mesa = document.getElementById("mesa");

  const div = document.createElement("div");
  div.className = "carta";

  const invertida = modoInvertido && Math.random() < 0.5;

  div.innerHTML = `
    <p>${carta.nome}</p>
    <img src="${carta.arquivo}" class="${invertida ? 'invertida' : ''}">
  `;

  mesa.appendChild(div);
}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
